<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Shakespeare GPT</title>
    <meta name="description" content="A beautiful interface to interact with a custom trained Tiny Shakespeare GPT model.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Tiny Shakespeare GPT</h1>
            <p class="subtitle">Experience the eloquence of a miniature language model.</p>
        </header>

        <main class="glass-panel">
            <div class="settings-panel">
                <div class="setting-group">
                    <label for="temperature">Temperature <span id="temp-val">0.8</span></label>
                    <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.8">
                </div>
                <div class="setting-group">
                    <label for="max-tokens">Max Tokens <span id="tokens-val">500</span></label>
                    <input type="range" id="max-tokens" min="10" max="1000" step="10" value="500">
                </div>
                <div class="setting-group">
                    <label for="top-k">Top K <span id="top-k-val">200</span></label>
                    <input type="range" id="top-k" min="1" max="500" step="1" value="200">
                </div>
                <div class="setting-group">
                    <label for="seed">Seed</label>
                    <input type="number" id="seed" value="1337">
                </div>
            </div>

            <div class="chat-container">
                <div id="output-box" class="output-box">
                    <div class="placeholder">The generated text will appear here...</div>
                </div>
                
                <form id="generate-form" class="input-area">
                    <textarea id="prompt-input" placeholder="Start your prompt here (e.g., 'ROMEO:')..." rows="3"></textarea>
                    <button type="submit" id="generate-btn" class="glow-button">
                        <span>Generate</span>
                        <div class="loader hidden" id="btn-loader"></div>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
